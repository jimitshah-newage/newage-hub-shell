<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>NewAge Project Hub</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#e60000">
<link rel="icon" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">
<style>
  html,body{height:100%;margin:0;background:#ffffff;font-family:-apple-system,system-ui,'Segoe UI',sans-serif;color:#241f19}
  .wrap{height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;gap:18px;padding:24px}
  img{width:96px;height:96px}
  h1{font-size:17px;margin:0}
  p{font-size:13px;color:#5b626c;margin:0;max-width:280px;line-height:1.5}
  .open-btn{appearance:none;border:none;background:#e60000;color:#fff;font-size:15px;font-weight:700;
    padding:14px 28px;border-radius:12px;cursor:pointer;text-decoration:none;display:inline-block}
  .open-btn:active{background:#c20000}
</style>
</head>
<body>
  <div class="wrap">
    <img src="icon-192.png" alt="NewAge Project Hub">
    <h1>NewAge Project Hub</h1>
    <p>Tap below to open your dashboard.</p>
    <!-- A plain, real anchor tag — works with no JavaScript at all, and
         never navigates on its own, so a scanner/crawler visiting this
         page sees only this shell (with its manifest and service worker),
         never the dashboard it links to. -->
    <a class="open-btn" id="openLink" href="https://script.google.com/a/macros/newage-india.in/s/AKfycbwM2julLb3yApzOqrT2e5SzEqTi0t6_XEU2zevDE7lu1AwvQZwGVhundPuPktrhIUAr/exec">
      Open Dashboard
    </a>
  </div>

<script>
  // Registers the service worker purely so this shell qualifies as an
  // installable PWA. It does not cache or serve any of the real app's
  // content — the actual dashboard lives entirely on Google Apps Script.
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('service-worker.js').catch(function(){});
  }
</script>
</body>
</html>
